# 1. Mandatory application name for Config Server (tells the server which config file to fetch)
spring.application.name=orderService
# 2. Define the active profile (e.g., dev, test, prod)
spring.profiles.active=dev
# 3. Modern way to connect to Config Server: configserver: + URI
# We use "optional:" so the app can still start if the config server is temporarily down.
spring.config.import=optional:configserver:http://localhost:8888
